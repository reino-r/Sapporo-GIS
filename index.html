<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGIS Sapporo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    /* Popup Table */
    .popup-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
      margin-top: 4px;
    }

    .popup-table th,
    .popup-table td {
      border: 1px solid #ddd;
      padding: 3px 5px;
      text-align: left;
      vertical-align: top;
    }

    .popup-table th {
      background: #f8f9fa;
      font-weight: 600;
      width: 35%;
    }

    /* Legend & Info Panel */
    .info-panel {
      background: white;
      padding: 10px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      font-size: 12px;
      line-height: 1.5;
      color: #333;
    }

    .legend i {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      opacity: 0.9;
      border: 1px solid #ccc;
      border-radius: 2px;
    }

    .active-list {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #eee;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1. Inisialisasi Peta dengan Batas Area Sapporo
    const sapporoBounds = L.latLngBounds([42.90, 141.00], [43.25, 141.70]);
    const map = L.map('map', {
      preferCanvas: true,       // ⚡ Performa lebih baik untuk data besar
      maxBounds: sapporoBounds, // 🔒 Kunci viewport agar tidak keluar Sapporo
      minZoom: 11,
      maxZoom: 18
    }).setView([43.0621, 141.3544], 13);

    // 2. Basemap OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 18
    }).addTo(map);

    // 3. Style untuk setiap kategori
    const styles = {
      transportasi: { color: '#3388ff', weight: 2, opacity: 0.8, fillOpacity: 0.3 },
      pendidikan: { color: '#2ca02c', weight: 2, opacity: 0.9, fillOpacity: 0.4 },
      kesehatan: { color: '#ff7f0e', weight: 2, opacity: 0.9, fillOpacity: 0.4 },
      publik: { color: '#9467bd', weight: 2, opacity: 0.8, fillOpacity: 0.3 }
    };

    // 4. Fungsi Popup Dinamis
    function onEachFeature(feature, layer) {
      if (feature.properties) {
        let html = '<table class="popup-table">';
        for (let key in feature.properties) {
          const val = feature.properties[key];
          if (val !== null && val !== undefined && typeof val !== 'object') {
            html += `<tr><th>${key}</th><td>${val}</td></tr>`;
          }
        }
        html += '</table>';
        layer.bindPopup(html, { maxWidth: 300, maxHeight: 250, autoPan: true });
      }
    }

    // 5. Load & Kategorikan GeoJSON
    fetch('data/Ks_Task_6.geojson')
      .then(res => res.ok ? res.json() : Promise.reject('File tidak ditemukan'))
      .then(data => {
        const groups = { transportasi: [], pendidikan: [], kesehatan: [], publik: [] };

        // Kategorikan fitur berdasarkan properties
        data.features.forEach(f => {
          const p = f.properties || {};
          const amenity = String(p.amenity || '').toLowerCase();
          const highway = String(p.highway || '').toLowerCase();
          const railway = String(p.railway || '').toLowerCase();

          // Transportasi: jalan, rel, stasiun
          if (highway || railway || p.public_transport ||
            ['train_station', 'bus_station', 'subway_entrance'].includes(amenity)) {
            groups.transportasi.push(f);
          }
          // Pendidikan: school, university, college, kindergarten
          else if (['school', 'university', 'college', 'kindergarten'].includes(amenity)) {
            groups.pendidikan.push(f);
          }
          // Kesehatan: hospital, clinic, doctors, pharmacy
          else if (['hospital', 'clinic', 'doctors', 'pharmacy', 'dentist'].includes(amenity)) {
            groups.kesehatan.push(f);
          }
          // Publik: library, community centre, place of worship, dll
          else {
            groups.publik.push(f);
          }
        });

        // Buat Layer GeoJSON per kategori
        const layers = {};
        const layerNames = {
          transportasi: '🚗 Transportasi',
          pendidikan: '🎓 Pendidikan',
          kesehatan: '🏥 Kesehatan',
          publik: '🏛️ Fasilitas Publik'
        };

        Object.keys(groups).forEach(key => {
          if (groups[key].length > 0) {
            layers[key] = L.geoJSON(groups[key], {
              style: styles[key],
              onEachFeature: onEachFeature
            }).addTo(map);
          }
        });

        // Auto zoom ke semua data
        const allLayers = Object.values(layers);
        if (allLayers.length > 0) {
          map.fitBounds(L.featureGroup(allLayers).getBounds(), {
            padding: [50, 50],
            maxZoom: 15
          });
        }

        // 6. Filter / Layer Control (Selalu Terbuka)
        const overlays = {};
        Object.keys(layers).forEach(key => {
          overlays[layerNames[key]] = layers[key];
        });

        L.control.layers(null, overlays, {
          collapsed: false,  // Selalu terbuka sebagai panel filter
          position: 'topright'
        }).addTo(map);

        // 7. Legenda & Indikator Layer Aktif di Pojok Kanan Bawah
        const infoControl = L.control({ position: 'bottomright' });
        infoControl.onAdd = function () {
          const div = L.DomUtil.create('div', 'info-panel');
          div.innerHTML = `
                        <strong>Legenda</strong><br>
                        <i style="background:#3388ff"></i> Transportasi<br>
                        <i style="background:#2ca02c"></i> Pendidikan<br>
                        <i style="background:#ff7f0e"></i> Kesehatan<br>
                        <i style="background:#9467bd"></i> Fasilitas Publik
                        <div class="active-list" id="active-layers">Layer Aktif: Semua</div>
                    `;
          return div;
        };
        infoControl.addTo(map);

        // Update teks layer aktif saat toggle
        const updateActiveLayers = () => {
          const active = Object.keys(overlays).filter(name => {
            const layerKey = Object.keys(layers).find(k => layerNames[k] === name);
            return layerKey && map.hasLayer(layers[layerKey]);
          });
          const activeText = active.length > 0 ? active.join(', ') : 'Tidak ada';
          document.getElementById('active-layers').textContent = `Layer Aktif: ${activeText}`;
        };

        map.on('overlayadd overlayremove', updateActiveLayers);
        updateActiveLayers(); // Initial call

      })
      .catch(err => {
        console.error('Error:', err);
        alert('⚠️ Gagal memuat data GeoJSON.\n\nPastikan:\n1. File ada di folder data/Ks_Task_6.geojson\n2. Ukuran file < 50 MB\n3. Format file valid GeoJSON');
      });
  </script>
</body>

</html>
