<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGIS Sapporo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .popup-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    .popup-table th,
    .popup-table td {
      border: 1px solid #ccc;
      padding: 4px 6px;
      text-align: left;
    }

    .popup-table th {
      background: #f5f5f5;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1. Inisialisasi Peta (Sapporo)
    const map = L.map('map').setView([43.0621, 141.3544], 13);

    // 2. Basemap OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 3. Fungsi Popup Dinamis
    function onEachFeature(feature, layer) {
      if (feature.properties) {
        let html = '<table class="popup-table">';
        for (let key in feature.properties) {
          html += `<tr><th>${key}</th><td>${feature.properties[key]}</td></tr>`;
        }
        html += '</table>';
        layer.bindPopup(html);
      }
    }

    // 4. Load GeoJSON & Tampilkan ke Peta
    fetch('data/Ks_Task_6.geojson')
      .then(res => {
        if (!res.ok) throw new Error('Gagal memuat file GeoJSON');
        return res.json();
      })
      .then(data => {
        const geoLayer = L.geoJSON(data, { onEachFeature: onEachFeature }).addTo(map);
        // Opsional: auto-zoom ke extent data
        if (data.features.length > 0) map.fitBounds(geoLayer.getBounds());
      })
      .catch(err => console.error('Error:', err));
  </script>
</body>

</html>
