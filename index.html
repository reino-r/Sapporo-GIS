<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGIS Sapporo - Fasilitas Publik & Transportasi</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .popup-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
      margin-top: 4px;
    }

    .popup-table th,
    .popup-table td {
      border: 1px solid #ddd;
      padding: 3px 5px;
      text-align: left;
      vertical-align: top;
    }

    .popup-table th {
      background: #f8f9fa;
      font-weight: 600;
      width: 35%;
    }

    .info-panel {
      background: #fff;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      font-size: 12px;
      line-height: 1.4;
      color: #333;
      width: 250px;
      height: 320px;
      display: flex;
      flex-direction: column;
    }

    .legend-header {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 8px;
      border-bottom: 1px solid #eee;
      padding-bottom: 4px;
    }

    .legend-items {
      flex: 1;
      overflow-y: auto;
    }

    .legend-item {
      display: flex;
      align-items: flex-start;
      margin: 5px 0;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      border: 1px solid #bbb;
      border-radius: 2px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .legend-dashed {
      width: 16px;
      height: 0;
      border-top: 2px dashed #ff0000;
      margin-right: 8px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .active-container {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #ddd;
      font-weight: 500;
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    /* Tombol Reset View */
    .reset-button {
      background: #fff;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
      color: #333;
      font-size: 20px;
      height: 34px;
      width: 34px;
      line-height: 34px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-button:hover {
      background: #f4f4f4;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Koordinat pusat Sapporo
    const sapporoCenter = [43.0621, 141.3544];
    const sapporoZoom = 13;

    // 1. Inisialisasi Peta
    const map = L.map('map', {
      preferCanvas: true,
      minZoom: 3,
      maxZoom: 19,
      zoomControl: true
    }).setView(sapporoCenter, sapporoZoom);

    // Basemap CartoDB Positron
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OSM & CARTO',
      maxZoom: 19
    }).addTo(map);

    // 2. TOMBOL RESET VIEW (Kembali ke Sapporo)
    const resetControl = L.control({ position: 'topleft' });
    resetControl.onAdd = function () {
      const div = L.DomUtil.create('div', 'reset-button');
      div.innerHTML = '🎯'; // Icon target
      div.title = 'Kembali ke Pusat Sapporo';

      L.DomEvent.on(div, 'click', function (e) {
        L.DomEvent.stopPropagation(e);
        map.setView(sapporoCenter, sapporoZoom, {
          animate: true,
          duration: 1
        });
      });

      return div;
    };
    resetControl.addTo(map);

    // 3. Style & Popup
    const styles = {
      transportasi: { color: '#0066cc', weight: 3, opacity: 0.9, fillColor: '#0066cc', fillOpacity: 0.4, radius: 6 },
      pendidikan: { color: '#00aa00', weight: 2, opacity: 0.9, fillColor: '#00aa00', fillOpacity: 0.5, radius: 6 },
      kesehatan: { color: '#cc3300', weight: 2, opacity: 0.9, fillColor: '#cc3300', fillOpacity: 0.5, radius: 6 },
      publik: { color: '#9933cc', weight: 2, opacity: 0.8, fillColor: '#9933cc', fillOpacity: 0.4, radius: 5 }
    };

    function onEachFeature(feature, layer) {
      if (feature.properties) {
        let html = '<table class="popup-table">';
        const priority = ['name', 'name:en', 'amenity', 'highway', 'railway', 'building', 'operator'];
        priority.forEach(k => { if (feature.properties[k]) html += `<tr><th>${k}</th><td>${feature.properties[k]}</td></tr>`; });
        for (let k in feature.properties) {
          if (!priority.includes(k)) {
            const v = feature.properties[k];
            if (v !== null && v !== undefined && typeof v !== 'object' && String(v).length < 80) {
              html += `<tr><th>${k}</th><td>${v}</td></tr>`;
            }
          }
        }
        html += '</table>';
        layer.bindPopup(html, { maxWidth: 320, maxHeight: 280, autoPan: true });
      }
    }

    // 4. Load Data & Filter dengan Turf.js
    Promise.all([
      fetch('data/Ks_Task_6.geojson').then(r => r.ok ? r.json() : Promise.reject()),
      fetch('data/sapporo_boundary.geojson').then(r => r.ok ? r.json() : Promise.reject())
    ])
      .then(([data, boundary]) => {

        // Tampilkan Batas Kota
        L.geoJSON(boundary, {
          style: { color: '#ff0000', weight: 3, opacity: 0.8, dashArray: '8, 8', fill: false },
          interactive: false
        }).addTo(map);

        const boundaryPolygon = boundary.features[0];
        const featuresInside = [];

        data.features.forEach(feature => {
          let isInside = false;
          try {
            if (feature.geometry.type === 'Point') {
              isInside = turf.booleanPointInPolygon(feature.geometry.coordinates, boundaryPolygon);
            } else {
              isInside = turf.booleanWithin(feature, boundaryPolygon);
            }
          } catch (e) {
            console.error("Error checking geometry:", e);
          }

          if (isInside) {
            featuresInside.push(feature);
          }
        });

        console.log(`Total fitur awal: ${data.features.length}`);
        console.log(`Fitur dalam batas kota: ${featuresInside.length}`);

        const filteredData = {
          type: "FeatureCollection",
          features: featuresInside
        };

        // Kategorisasi
        const groups = { transportasi: [], pendidikan: [], kesehatan: [], publik: [] };
        const counts = { transportasi: 0, pendidikan: 0, kesehatan: 0, publik: 0 };

        featuresInside.forEach(f => {
          const p = f.properties || {};
          const amenity = String(p.amenity || '').toLowerCase();
          const highway = String(p.highway || '').toLowerCase();
          const railway = String(p.railway || '').toLowerCase();
          const pt = String(p.public_transport || '').toLowerCase();
          const route = String(p.route || '').toLowerCase();

          if (highway || railway || route || pt || ['train_station', 'bus_station', 'subway_entrance', 'platform', 'stop'].includes(amenity) || ['yes', 'station', 'stop'].includes(pt)) {
            groups.transportasi.push(f); counts.transportasi++;
          } else if (['school', 'university', 'college', 'kindergarten', 'library'].includes(amenity)) {
            groups.pendidikan.push(f); counts.pendidikan++;
          } else if (['hospital', 'clinic', 'doctors', 'pharmacy', 'dentist', 'veterinary'].includes(amenity)) {
            groups.kesehatan.push(f); counts.kesehatan++;
          } else {
            groups.publik.push(f); counts.publik++;
          }
        });

        // Buat Layer
        const layers = {};
        const layerNames = {
          transportasi: '🚗 Transportasi',
          pendidikan: '🎓 Pendidikan',
          kesehatan: '🏥 Kesehatan',
          publik: '🏛️ Fasilitas Publik'
        };

        Object.keys(groups).forEach(key => {
          if (groups[key].length > 0) {
            layers[key] = L.geoJSON(groups[key], {
              style: styles[key],
              pointToLayer: (feat, latlng) => L.circleMarker(latlng, styles[key]),
              onEachFeature: onEachFeature
            }).addTo(map);
          }
        });

        // Auto Zoom ke data
        const allLayers = Object.values(layers);
        if (allLayers.length > 0) map.fitBounds(L.featureGroup(allLayers).getBounds(), { padding: [50, 50], maxZoom: 15 });

        // Filter Control
        const overlays = {};
        Object.keys(layers).forEach(k => overlays[layerNames[k]] = layers[k]);
        L.control.layers(null, overlays, { collapsed: false, position: 'topright' }).addTo(map);

        // Legenda
        const legendCtrl = L.control({ position: 'bottomright' });
        legendCtrl.onAdd = function () {
          const div = L.DomUtil.create('div', 'info-panel');
          div.innerHTML = `
                    <div class="legend-header">LEGENDA</div>
                    <div class="legend-items">
                        <div class="legend-item"><span class="legend-color" style="background:#0066cc"></span><span>Transportasi<br><small style="color:#666">${counts.transportasi} fitur</small></span></div>
                        <div class="legend-item"><span class="legend-color" style="background:#00aa00"></span><span>Pendidikan<br><small style="color:#666">${counts.pendidikan} fitur</small></span></div>
                        <div class="legend-item"><span class="legend-color" style="background:#cc3300"></span><span>Kesehatan<br><small style="color:#666">${counts.kesehatan} fitur</small></span></div>
                        <div class="legend-item"><span class="legend-color" style="background:#9933cc"></span><span>Fasilitas Publik<br><small style="color:#666">${counts.publik} fitur</small></span></div>
                        <div class="legend-item"><span class="legend-dashed"></span><span>Batas Kota Sapporo (Presisi)</span></div>
                    </div>
                    <div class="active-container" id="active-layers">Layer Aktif: Semua</div>
                `;
          return div;
        };
        legendCtrl.addTo(map);

        // Update Status Layer Aktif
        const updateActive = () => {
          const active = Object.keys(overlays).filter(n => {
            const k = Object.keys(layers).find(lk => layerNames[lk] === n);
            return k && map.hasLayer(layers[k]);
          });
          document.getElementById('active-layers').textContent = `Layer Aktif: ${active.length ? active.join(', ') : 'Tidak ada'}`;
        };
        map.on('overlayadd overlayremove', updateActive);
        updateActive();
      })
      .catch(err => {
        console.error(err);
        alert('⚠️ Gagal memuat data.\nPastikan file ada di folder data/:\n• Ks_Task_6.geojson\n• sapporo_boundary.geojson');
      });
  </script>
</body>

</html>
