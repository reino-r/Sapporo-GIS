<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGIS Sapporo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .popup-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
      margin-top: 4px;
    }

    .popup-table th,
    .popup-table td {
      border: 1px solid #ccc;
      padding: 4px 6px;
      text-align: left;
      vertical-align: top;
    }

    .popup-table th {
      background: #f4f4f4;
      font-weight: 600;
      width: 40%;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1. Inisialisasi Peta dengan Optimasi & Batas Area Sapporo
    const sapporoBounds = L.latLngBounds([42.90, 141.00], [43.25, 141.70]);
    const map = L.map('map', {
      preferCanvas: true,       // ⚡ Menggunakan Canvas (lebih ringan untuk data besar)
      maxBounds: sapporoBounds, // 🔒 Kunci viewport agar tidak keluar dari Sapporo
      minZoom: 11,
      maxZoom: 18
    }).setView([43.0621, 141.3544], 13);

    // 2. Basemap OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 18
    }).addTo(map);

    // 3. Fungsi Popup Dinamis (Menampilkan Seluruh Atribut dalam Tabel)
    function onEachFeature(feature, layer) {
      if (feature.properties) {
        let html = '<table class="popup-table">';
        for (let key in feature.properties) {
          let val = feature.properties[key];
          // Filter agar tidak menampilkan nilai null, undefined, atau objek kompleks
          if (val !== null && val !== undefined && typeof val !== 'object') {
            html += `<tr><th>${key}</th><td>${val}</td></tr>`;
          }
        }
        html += '</table>';
        layer.bindPopup(html, { maxWidth: 300, maxHeight: 250, autoPan: true });
      }
    }

    // 4. Load GeoJSON & Auto Zoom ke Data
    fetch('data/Ks_Task_6.geojson')
      .then(res => {
        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
        return res.json();
      })
      .then(data => {
        const geoLayer = L.geoJSON(data, { onEachFeature: onEachFeature }).addTo(map);

        // Auto zoom & pan ke extent data yang berhasil dimuat
        if (geoLayer.getLayers().length > 0) {
          map.fitBounds(geoLayer.getBounds(), { padding: [50, 50], maxZoom: 15 });
        }
      })
      .catch(err => {
        console.error('Gagal memuat data GeoJSON:', err);
        alert('Gagal memuat peta. Pastikan file data/Ks_Task_6.geojson tersedia dan path benar.');
      });
  </script>
</body>

</html>
